<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Sokoban - Presentation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
    <style>
        .reveal h1, .reveal h2, .reveal h3 { color: #2c3e50; }
        .reveal section { text-align: left; }
        .reveal .center { text-align: center; }
        .reveal code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
        .reveal pre code { padding: 12px; font-size: 0.7em; }
        .reveal table { font-size: 0.65em; margin: 0 auto; }
        .reveal th, .reveal td { padding: 4px 10px; }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <section data-markdown="intro.md" data-separator="^---$"></section>
            <section data-markdown="part2.md" data-separator="^---$"></section>
            <section data-markdown="part3.md" data-separator="^---$"></section>
            <section data-markdown="part1.md" data-separator="^---$"></section>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            transition: 'slide',
            plugins: [RevealMarkdown],
        });
    </script>
</body>
</html>
